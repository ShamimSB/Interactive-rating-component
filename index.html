<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Interactive rating component</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="para-container">
    <div class="container">
    <div class="star-icon">
      <img src="images/icon-star.svg" alt="star icon">
    </div>
    <h2 class="heading-1">How did we do?</h2>

    <p class="para"> Please let us know how we did with your support       request. All feedback is appreciated 
    to help us improve our offering!</p>

  <div class="rating-buttons">
    <button class="rating-btn">1</button> 
    <button class="rating-btn">2</button> 
    <button class="rating-btn">3</button> 
    <button class="rating-btn">4</button> 
    <button class="rating-btn">5</button> 
  </div>

  <button class="sub-btn">SUBMIT</button>
  </div>

  <div class="thank-you" id="thank-you">
    <img src="images/illustration-thank-you.svg" alt="Thank you illustration" id="imgee">
      <p id="para"></p>
      <h2>Thank you!</h2>
      <p>  We appreciate you taking the time to  give a rating. If you ever need more   support, 
       don’t hesitate to get in touch!</p>
  </div>
  </div>
  


  <script src="script.js"></script>
</body>
</html>
